function renderEventLog(events) {
  const div = document.createElement('div');
  div.className = 'event-log';
  div.id = 'eventLog';

  if (!events || events.length === 0) {
    div.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-dim);">No events</div>';
    return div;
  }

  // Filter to only show significant events (not every message)
  const significantEvents = events.filter(e => {
    const type = e.event;
    return ['session_start', 'session_end',
            'agent_launched', 'agent_start', 'agent_done', 'agent_error',
            'review_launched', 'review_completed', 'build_completed',
            'revision_started', 'pr_submitted', 'merge_completed', 'merge_conflict_detected',
            'iteration', 'escalation', 'fix_request', 'max_iterations'].includes(e.event);
  });

  // Show most recent first
  const sortedEvents = [...significantEvents].reverse();

  div.innerHTML = sortedEvents.map(e => renderEventLogEntry(e)).join('');
  return div;
}

function renderEventLogEntry(event) {
  const ts = formatLogTime(event.ts);
  const type = event.event || 'unknown';
  const agentId = event.agent_id || '';
  const msg = getEventMessage(event);

  const agentLink = agentId
    ? `<span class="event-log-agent" onclick="navigateTo('dialog', '${escapeHtml(agentId)}'); return false;">${escapeHtml(agentId)}</span>`
    : '';

  return `
    <div class="event-log-entry">
      <span class="event-log-ts">${ts}</span>
      <span class="event-log-type ${type}">${type.replace(/_/g, ' ')}</span>
      ${agentLink}
      <span class="event-log-msg ${msg ? '' : 'dim'}">${escapeHtml(msg) || '—'}</span>
    </div>
  `;
}

function getEventMessage(event) {
  const type = event.event;
  switch (type) {
    case 'session_start':
      return event.config?.task_id || event.task || 'Session started';
    case 'agent_launched':
        // Cross-chapter agents (maintain, triage, scan) may not have a chapter_id
        const chapterId = event.chapter_id;
        const agentType = event.agent_type || '?';
        const theoremName = event.theorem_name;
        const issueId = event.issue_id;
        const isCrossChapter = ['maintain', 'triage', 'scan', 'progress'].includes(agentType);
        const isReviewer = ['math_reviewer', 'engineering_reviewer'].includes(agentType);
        const isProver = agentType === 'prove';
        const isMaintain = agentType === 'maintain';
        if (isReviewer) {
          // Reviewers show their target PR
          return `${agentType} → ${event.review_target || '?'}`;
        }
        if (isMaintain && issueId) {
          // Maintain agents show issue ID
          return `maintain → issue #${issueId}`;
        }
        if (isCrossChapter && !chapterId) {
          return agentType;  // Just show agent type, no arrow
        }
        if (isProver) {
          // Provers show theorem name (chapter_id may be empty)
          return `prove → ${theoremName || chapterId || '?'}`;
        }
        return `${agentType} → ${chapterId || '?'}${theoremName ? ' (' + theoremName + ')' : ''}`;
    case 'agent_start':
      return `type=${event.agent_type || '?'}`;
    case 'agent_done':
      return event.result || 'completed';
    case 'agent_error':
      return event.error || 'error';
    case 'review_launched':
      return `pr=${event.pr_id || '?'}`;
    case 'review_completed':
      return event.combined_verdict || event.verdict || '';
    case 'build_completed':
      return `${event.context || '?'}: ${event.passed ? 'passed' : 'failed'}${event.duration_s ? ' (' + event.duration_s + 's)' : ''}${event.error ? ' — ' + event.error.slice(0, 80) : ''}`;
    case 'revision_started':
      return `pr=${event.pr_id || '?'} rev #${event.revision_number || '?'}`;
    case 'pr_submitted':
      return event.pr_url || 'submitted';
    case 'merge_completed':
      if (event.success) {
        return event.commit_hash?.slice(0, 8) || 'success';
      } else {
        // Show failure reason + details
        const reason = event.failure_reason;
        if (reason === 'merge_conflict') {
          return `conflict in: ${event.conflict_files?.join(', ') || 'unknown files'}`;
        } else if (reason === 'build_failed') {
          return `build failed${event.build_duration_s ? ' (' + event.build_duration_s.toFixed(1) + 's)' : ''}`;
        } else if (reason === 'build_timeout') {
          return 'build timeout';
        } else {
          return event.error || 'failed';
        }
      }
    case 'merge_conflict_detected':
      return `pr=${event.pr_id || '?'} conflicts: ${event.conflict_files?.join(', ') || 'unknown'}`;
    case 'iteration':
      return `#${event.iteration || '?'}`;
    case 'escalation':
      return event.reason || event.message || 'escalated';
    case 'fix_request':
      return event.theorem_name ? `for ${event.theorem_name}` : 'fix proposed';
    case 'max_iterations':
      return `reached ${event.max_iterations || '?'} iterations`;
    case 'session_end':
      return `${event.status || 'ended'}${event.error ? ' — ' + event.error.split('\n').pop().slice(0, 100) : ''}`;
    default:
      return event.message || '';
  }
}

function formatLogTime(ts) {
  if (!ts) return '—';
  try {
    const d = new Date(ts);
    return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch {
    return ts;
  }
}

function createStatsRow(stats) {
    const duration = stats.duration_seconds
    ? formatDuration(stats.duration_seconds)
    : '—';

  // Compute non-empty merged PRs count from PR data
  const prData = getPRTimelineData();
  const nonEmptyMergedCount = prData.merged.length;

  let agentsDisplay = `<span class="value accent">${stats.agents}</span>`;
  if (stats.agents_done > 0 || stats.agents_error > 0) {
    const parts = [];
    // agents_done includes errors, so subtract to get successful completions
    const successfulDone = stats.agents_done - stats.agents_error;
    if (successfulDone > 0) parts.push(`<span class="green">${successfulDone} done</span>`);
    if (stats.agents_error > 0) parts.push(`<span class="red">${stats.agents_error} error</span>`);
    agentsDisplay += ` <span style="font-size: 11px; color: var(--text-dim);">(${parts.join(', ')})</span>`;
  }

// Build theorems display (total in files, how many proved vs with sorries)
  let theoremsHtml = '';
  const totalTheorems = stats.total_theorems || 0;
  const provenTheorems = stats.proven_theorems || 0;
  if (totalTheorems > 0) {
    theoremsHtml = `
      <div class="stat-card">
        <span class="label">Theorems</span>
        <span class="value green">${provenTheorems}</span>
        <span class="value dim">proved</span>
        <span class="value">/</span>
        <span class="value">${totalTheorems}</span>
      </div>
    `;
  }

  // Build issues display
  let issuesHtml = '';
  const openIssues = stats.open_issues || 0;
  const closedIssues = stats.closed_issues || 0;
  issuesHtml = `
    <div class="stat-card">
      <span class="label">Issues</span>
      <span class="value ${openIssues > 0 ? 'yellow' : 'green'}">${openIssues}</span>
      <span class="value dim">open</span>
      <span class="value green">${closedIssues}</span>
      <span class="value dim">closed</span>
    </div>
  `;

  // Build active agents display
  let activeAgentsHtml = '';
  const activeSketchers = stats.active_sketchers || 0;
  const activeProvers = stats.active_provers || 0;
  if (activeSketchers > 0 || activeProvers > 0) {
    const parts = [];
    if (activeSketchers > 0) {
      parts.push(`<span class="accent">${activeSketchers}</span> sketch agent${activeSketchers !== 1 ? 's' : ''}`);
    }
    if (activeProvers > 0) {
      parts.push(`<span class="accent">${activeProvers}</span> prove agent${activeProvers !== 1 ? 's' : ''}`);
    }
    activeAgentsHtml = `
      <div class="stat-card">
        <span class="label">Active</span>
        <span class="value small">${parts.join(', ')}</span>
      </div>
    `;
  }

  const div = document.createElement('div');
  div.className = 'stats-row';
  div.innerHTML = `
    <div class="stat-card">

      <span class="label">Agents</span>

    ${activeAgentsHtml}
    <div class="stat-card">
      <span class="label">Duration</span>
      <span class="value">${duration}</span>
    </div>
    <div class="stat-card">

      <span class="value green">+${stats.diff_stats?.['+'] || 0}</span>
      <span class="value red">-${stats.diff_stats?.['-'] || 0}</span>
    </div>
    <div class="stat-card">
      <span class="label">PRs Merged</span>
      <span class="value ${nonEmptyMergedCount > 0 ? 'green' : ''}">${nonEmptyMergedCount}</span>
    </div>
    ${theoremsHtml}

  `;
  return div;
}

function renderReviewPills(review, prId) {
  if (!review) return '<span style="color: var(--text-dim); font-size: 12px;">—</span>';

  const pills = [];

  // Derive reviewer agent IDs from pr_id
  const mathReviewerAgentId = prId ? `math-${prId}` : null;
  const engReviewerAgentId = prId ? `engineering-${prId}` : null;

  if (review.math) {
    const verdict = review.math.verdict;
    const icon = verdict === 'approve' ? '✓' : verdict === 'reject' ? '✗' : '?';
    const title = review.math.summary || `Math: ${verdict}`;
    const dialogLink = mathReviewerAgentId ?
      `onclick="navigateTo('dialog', '${escapeHtml(mathReviewerAgentId)}'); event.stopPropagation(); return false;" style="cursor: pointer;"` : '';
    pills.push(`<span class="reviewer-pill math" title="${escapeHtml(title)}" ${dialogLink}>${icon} math</span>`);
  }

  if (review.engineering) {
    const verdict = review.engineering.verdict;
    const icon = verdict === 'approve' ? '✓' : verdict === 'reject' ? '✗' : '?';
    const title = review.engineering.summary || `Engineering: ${verdict}`;
    const dialogLink = engReviewerAgentId ?
      `onclick="navigateTo('dialog', '${escapeHtml(engReviewerAgentId)}'); event.stopPropagation(); return false;" style="cursor: pointer;"` : '';
    pills.push(`<span class="reviewer-pill engineering" title="${escapeHtml(title)}" ${dialogLink}>${icon} eng</span>`);
  }

  if (review.build_passed !== undefined) {
    const icon = review.build_passed ? '✓' : '✗';
    const cls = review.build_passed ? 'build-pass' : 'build-fail';
    pills.push(`<span class="reviewer-pill ${cls}" title="Build">${icon} build</span>`);
  }

  return pills.length > 0 ? `<span class="review-pills">${pills.join('')}</span>` : '<span style="color: var(--text-dim); font-size: 12px;">—</span>';
}

  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="page-header">
      <a href="#" class="back-link" onclick="navigateTo('main'); return false;">← Back to agents</a>
      <h2>Dialog: ${escapeHtml(agentLabel)}</h2>
      <a href="#" class="btn btn-secondary" onclick="navigateTo('pr', '${escapeHtml(agentId)}'); return false;">View PR →</a>
    </div>
    <div id="dialogStats" class="dialog-stats" style="display: none;"></div>
    <div class="messages-container" id="dialogContainer">
      <div class="empty-state"><p>Loading dialog...</p></div>
    </div>
  `;

  // Load dialog
  try {
    let dialogData = agentDialogCache[agentId];
    if (!dialogData) {
      const resp = await fetch(`/agent?path=${encodeURIComponent(currentRun)}&id=${encodeURIComponent(agentId)}`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      dialogData = await resp.json();
      agentDialogCache[agentId] = dialogData;
    }

    // Extract token stats from events
    const tokenStats = extractTokenStats(dialogData.events);
    const statsContainer = document.getElementById('dialogStats');
    if (tokenStats.totalInput > 0 || tokenStats.totalOutput > 0) {
      statsContainer.innerHTML = renderTokenStats(tokenStats);
      statsContainer.style.display = 'block';
    }

    const container = document.getElementById('dialogContainer');
    container.innerHTML = renderAgentDialog(dialogData.events);
    setTimeout(() => hljs.highlightAll(), 0);
  } catch (e) {
    document.getElementById('dialogContainer').innerHTML = `
      <div class="empty-state"><p>Failed to load dialog: ${escapeHtml(e.message)}</p></div>
    `;
  }
}

function extractTokenStats(events) {
  let totalInput = 0;
  let totalOutput = 0;
  let lastInputTokens = 0;
  let iterations = 0;
  let status = '';
  let error = '';

  for (const event of events) {
    if (event.event === 'msg') {
      if (event.input_tokens) {
        totalInput += event.input_tokens;
        lastInputTokens = event.input_tokens;
      }
      if (event.output_tokens) totalOutput += event.output_tokens;
    } else if (event.event === 'done') {
      // Use totals from done event if available (more accurate)
      if (event.total_input_tokens) totalInput = event.total_input_tokens;
      if (event.total_output_tokens) totalOutput = event.total_output_tokens;
      iterations = event.iterations || 0;
      status = event.status || '';
      error = event.error || '';
    }
  }

  return { totalInput, totalOutput, lastInputTokens, iterations, status, error };
}

function renderTokenStats(stats) {
  const totalTokens = stats.totalInput + stats.totalOutput;
  const formatNum = n => n.toLocaleString();

  let errorHtml = '';
  if (stats.error) {
    errorHtml = `
    <div class="agent-error-banner">
      <span class="error-icon">⚠</span>
      <span class="error-label">Error:</span>
      <pre class="error-message">${escapeHtml(stats.error)}</pre>
    </div>
    `;
  }

  return `
    <div class="token-stats-bar">
      <span class="token-stat">
        <span class="token-label">Input:</span>
        <span class="token-value">${formatNum(stats.totalInput)}</span>
      </span>
      <span class="token-stat">
        <span class="token-label">Output:</span>
        <span class="token-value">${formatNum(stats.totalOutput)}</span>
      </span>
      <span class="token-stat">
        <span class="token-label">Total:</span>
        <span class="token-value token-total">${formatNum(totalTokens)}</span>
      </span>
      ${stats.lastInputTokens > 0 ? `
      <span class="token-stat">
        <span class="token-label">Last Input:</span>
        <span class="token-value token-last">${formatNum(stats.lastInputTokens)}</span>
      </span>
      ` : ''}
      ${stats.iterations > 0 ? `
      <span class="token-stat">
        <span class="token-label">Iterations:</span>
        <span class="token-value">${stats.iterations}</span>
      </span>
      ` : ''}
      ${stats.status ? `
      <span class="token-stat">
        <span class="token-label">Status:</span>
        <span class="token-value status-${stats.status}">${stats.status}</span>
      </span>
      ` : ''}
    </div>
    ${errorHtml}
  `;
}

function renderAgentDialog(events) {
  const messages = [];

  for (const event of events) {
    if (event.event === 'msg') {
      const msg = {
        role: event.role,
        content: event.content,
        ts: event.ts,
        toolCalls: event.tool_calls || []
      };
      messages.push(msg);
    } else if (event.event === 'tool') {
      messages.push({
        role: 'tool',
        name: event.name,
        args: event.args,
        result: event.result,
        duration_ms: event.duration_ms,
        ts: event.ts
      });
    } else if (event.event === 'compaction') {
      messages.push({
        role: 'compaction',
        compaction_number: event.compaction_number,
        context_tokens_before: event.context_tokens_before,
        context_tokens_after: event.context_tokens_after,
        input_tokens: event.input_tokens,
        output_tokens: event.output_tokens,
        summary: event.summary,
        ts: event.ts
      });
    }
  }

  if (messages.length === 0) {
    return '<div class="empty-state"><p>No messages recorded</p></div>';
  }

  // Track previous message role to determine when to show "assistant" label
  return messages.map((msg, idx) => {
    const prevMsg = idx > 0 ? messages[idx - 1] : null;
    const showAssistantLabel = msg.role === 'assistant' && prevMsg && prevMsg.role === 'user';
    return renderMessage(msg, idx, showAssistantLabel);
  }).join('');
}

function renderMessage(msg, idx, showAssistantLabel = false) {
  if (msg.role === 'tool') {
    return renderToolResult(msg);
  }

  if (msg.role === 'compaction') {
    return renderCompactionEvent(msg);
  }

  const content = (msg.content || '').trim();
  const isLong = content.length > 1500;
  const isEmpty = content.length === 0;
  const contentId = `msg-content-${idx}`;

  if (isEmpty && msg.role === 'assistant') {
    return '';
  }

  let roleHtml = '';
  if (msg.role === 'user') {
    roleHtml = `<span class="message-role ${msg.role}">${msg.role}</span>`;
  } else if (showAssistantLabel) {
    roleHtml = `<span class="message-role ${msg.role}">assistant</span>`;
  }

  // Render content as markdown for proper formatting
  const displayContent = isLong ? content.slice(0, 1500) + '…' : content;
  const renderedContent = renderMarkdown(displayContent);
  const fullRenderedContent = isLong ? renderMarkdown(content) : renderedContent;

  return `
    <div class="message ${isEmpty ? 'empty-content' : ''}">
      ${roleHtml}${!isEmpty ? `<div class="message-content ${isLong ? 'truncated' : ''}" id="${contentId}">${renderedContent}</div>
        ${isLong ? `<div class="message-content-full" id="${contentId}-full" style="display: none;">${fullRenderedContent}</div>
        <button class="expand-content-btn" onclick="expandMessageContent('${contentId}')">Show full message</button>` : ''}` : ''}
    </div>
  `;
}

function renderToolResult(msg) {
  const result = msg.result || '';
  const isLarge = result.length > 2000 || result.split('\n').length > 50;
  const tcId = `tool-result-${Date.now()}-${Math.random().toString(36).slice(2)}`;

  const args = msg.args || {};
  let argsInline = '';
  const MAX_ARGS_LEN = 60;

  if (args.command) {
    argsInline = args.command;
  } else if (args.path) {
    argsInline = args.path;
  } else if (Object.keys(args).length > 0) {
    const firstVal = Object.values(args)[0];
    argsInline = typeof firstVal === 'string' ? firstVal : JSON.stringify(firstVal);
  }

  if (argsInline.length > MAX_ARGS_LEN) {
    argsInline = argsInline.slice(0, MAX_ARGS_LEN) + '…';
  }

  const lines = result.split('\n').filter(l => l.trim());
  const lastLines = lines.slice(-3).map(l => l.length > 100 ? l.slice(0, 100) + '…' : l);
  const outputPreview = lastLines.length > 0 ? lastLines.join('\n') : '';

  return `
    <div class="tool-call" id="${tcId}">
      <div class="tool-call-header" onclick="toggleToolCall('${tcId}')">
        <span class="tool-name">${msg.name || 'tool'}(${escapeHtml(argsInline)})</span>
        <span class="tool-duration">${msg.duration_ms ? msg.duration_ms.toFixed(0) + 'ms' : ''}</span>
        <span class="expand-icon">▶</span>
      </div>
      ${outputPreview ? `<div class="tool-output-preview">${escapeHtml(outputPreview)}</div>` : ''}
      <div class="tool-call-body">
        <div class="tool-args">
          <div class="tool-label">Arguments</div>
          ${renderCodeBlock(JSON.stringify(msg.args, null, 2), 'json')}
        </div>
        <div class="tool-result">
          <div class="tool-label">Result ${isLarge ? `(${result.split('\n').length} lines)` : ''}</div>
          ${isLarge ? renderLargeResult(result, tcId) : renderCodeBlock(result, 'text')}
        </div>
      </div>
    </div>
  `;
}

function renderCompactionEvent(msg) {
  const tokensBefore = msg.context_tokens_before || 0;
  const tokensAfter = msg.context_tokens_after || 0;
  const reduction = tokensBefore > 0 ? ((1 - tokensAfter / tokensBefore) * 100).toFixed(0) : 0;
  const summary = msg.summary || '';
  const compactId = `compaction-${msg.compaction_number}-${Date.now()}`;

  return `
    <div class="compaction-event" id="${compactId}">
      <div class="compaction-header" onclick="toggleCompaction('${compactId}')">
        <span class="compaction-icon">[C]</span>
        <span class="compaction-title">Context Compaction #${msg.compaction_number}</span>
        <span class="compaction-reduction">-${reduction}%</span>
        <span class="expand-icon">▶</span>
      </div>
      <div class="compaction-stats">
        <span class="compaction-stat">
          <span class="stat-label">Before:</span>
          <span class="stat-value">${tokensBefore.toLocaleString()}</span>
        </span>
        <span class="compaction-arrow">→</span>
        <span class="compaction-stat">
          <span class="stat-label">After:</span>
          <span class="stat-value">${tokensAfter.toLocaleString()}</span>
        </span>
        <span class="compaction-stat">
          <span class="stat-label">Cost:</span>
          <span class="stat-value">${(msg.input_tokens || 0).toLocaleString()} / ${(msg.output_tokens || 0).toLocaleString()}</span>
        </span>
      </div>
      <div class="compaction-summary">
        <div class="compaction-summary-label">Context Summary</div>
        <div class="compaction-summary-content">${summary.length > 0 ? renderMarkdown(summary) : '<em>No summary recorded</em>'}</div>
      </div>
    </div>
  `;
}

function toggleCompaction(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('expanded');
}

function renderLargeResult(result, tcId) {
  const preview = result.slice(0, 1000);
  const resultId = `${tcId}-result`;
  const encodedResult = btoa(unescape(encodeURIComponent(result)));

  return `
    <pre class="large-preview" id="${resultId}-preview"><code>${escapeHtml(preview)}</code></pre>
    <button class="expand-content-btn" data-result="${encodedResult}" data-target="${resultId}" onclick="showFullResultFromBtn(this)">
      Show full result (${result.split('\n').length} lines)
    </button>
    <pre id="${resultId}-full" style="display: none;"><code>${escapeHtml(result)}</code></pre>
  `;
}

function showFullResultFromBtn(btn) {
  const targetId = btn.dataset.target;
  document.getElementById(`${targetId}-preview`).style.display = 'none';
  document.getElementById(`${targetId}-full`).style.display = 'block';
  btn.style.display = 'none';
  hljs.highlightAll();
}

function toggleToolCall(id) {
  document.getElementById(id).classList.toggle('expanded');
}

function expandContent(id) {
  const el = document.getElementById(id);
  el.classList.remove('truncated');
  el.nextElementSibling.style.display = 'none';
}

function expandMessageContent(id) {
  const truncated = document.getElementById(id);
  const full = document.getElementById(id + '-full');
  const btn = truncated.nextElementSibling?.nextElementSibling;
  if (truncated && full) {
    truncated.style.display = 'none';
    full.style.display = 'block';
    if (btn) btn.style.display = 'none';
  }
}

// ─── Rendering: PR Page ──────────────────────────────────────────
async function renderPRPage(agentId) {
  if (!agentId) {
    navigateTo('main');
    return;
  }

  const agent = agentsData.find(a => a.id === agentId);
  const agentLabel = agent ? `${agent.id} (${agent.type})` : agentId;

  document.getElementById('breadcrumb').innerHTML = `
    <a href="#" onclick="navigateTo('main'); return false;">Overview</a> / ${escapeHtml(agentLabel)} / PR
  `;

  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="page-header">
      <a href="#" class="back-link" onclick="navigateTo('main'); return false;">\u2190 Back to overview</a>
      <h2>\u25a1 PR: ${escapeHtml(agentLabel)}</h2>
      <a href="#" class="btn btn-secondary" onclick="navigateTo('dialog', '${escapeHtml(agentId)}'); return false;">\u2190 View Dialog</a>
    </div>
      <div id="prContent">
        <div class="empty-state"><p>Loading PR details...</p></div>
      </div>
    `;

  // Get agent data and find relevant PR/review events
  try {
    let dialogData = agentDialogCache[agentId];
    if (!dialogData) {
      const resp = await fetch(`/agent?path=${encodeURIComponent(currentRun)}&id=${encodeURIComponent(agentId)}`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      dialogData = await resp.json();
      agentDialogCache[agentId] = dialogData;
    }

    // Fetch the full chronological PR timeline
    const timelineResp = await fetch(`/pr-timeline?path=${encodeURIComponent(currentRun)}&agent_id=${encodeURIComponent(agentId)}`);
    let chronoEvents = [];
    if (timelineResp.ok) {
      const timelineData = await timelineResp.json();
      chronoEvents = timelineData.events || [];
    }

    // Collect ALL pr_submitted and review_completed events for this agent
    let prSubmissions = sessionData.events.filter(e => e.event === 'pr_submitted' && e.agent_id === agentId);
    const reviews = sessionData.events.filter(e => e.event === 'review_completed' && e.agent_id === agentId);

    // For resumed agents, synthesize pr_submitted events from the agent_resumed event
    // This ensures the viewer can show diffs for resumed runs
    const resumedEvent = sessionData.events.find(e => e.event === 'agent_resumed' && e.agent_id === agentId);
    if (resumedEvent && resumedEvent.diffs) {
      // Create synthetic pr_submitted events for each revision in diffs
      for (const [revNumStr, diffContent] of Object.entries(resumedEvent.diffs)) {
        const revNum = parseInt(revNumStr, 10);
        // Only add if we don't already have a pr_submitted for this revision
        const existing = prSubmissions.find(s => (s.revision_number || 0) === revNum);
        if (!existing) {
          // Compute diff stats from diff content
          const diffStats = parseDiffStats(diffContent);
          prSubmissions.push({
            event: 'pr_submitted',
            agent_id: agentId,
            pr_id: resumedEvent.pr_id,
            revision_number: revNum,
            diff: diffContent,  // Inline diff content
            diff_stats: diffStats,  // Computed from diff content
            ts: resumedEvent.ts,  // Use resumed timestamp as approximation
            agent_type: resumedEvent.agent_type,
            chapter_id: resumedEvent.chapter_id,
            theorem_name: resumedEvent.theorem_name,
          });
        }
      }
      // Sort by revision number after adding synthetic events
      prSubmissions.sort((a, b) => (a.revision_number || 0) - (b.revision_number || 0));
    }

    // Collect merge events (both successful and failed) for this agent
    const mergeEvents = sessionData.events.filter(e => e.event === 'merge_completed' && e.agent_id === agentId);
    const mergeConflictEvents = sessionData.events.filter(e => e.event === 'merge_conflict_detected' && e.agent_id === agentId);

    // Find the final merge status (latest merge event)
    const latestMerge = mergeEvents.length > 0 ? mergeEvents[mergeEvents.length - 1] : null;

    // Build revision timeline by matching submissions, reviews, and merge events by revision_number
    const revisions = buildRevisionTimeline(prSubmissions, reviews, mergeEvents, mergeConflictEvents);

    const container = document.getElementById('prContent');
    container.innerHTML = renderPRContentWithTimeline(agent, revisions, latestMerge, chronoEvents);

    // Load diff content for each revision
    for (const rev of revisions) {
      if (rev.submission) {
        const diffContainer = document.getElementById(`diff-${rev.revisionNumber}`);
        if (diffContainer) {
          try {
            let diffContent = null;
            // First try inline diff (new format or synthetic from agent_resumed)
            if (rev.submission.diff) {
              diffContent = rev.submission.diff;
            }
            // Fall back to diff_file (legacy format)
            else if (rev.submission.diff_file) {
              diffContent = await fetchText(`/diff?path=${encodeURIComponent(currentRun)}&file=${encodeURIComponent(rev.submission.diff_file)}`);
            }

            if (diffContent) {
              diffContainer.innerHTML = renderDiffContent(diffContent);
            } else {
              diffContainer.innerHTML = `<span style="color: var(--dim)">No diff available</span>`;
            }
          } catch (e) {
            diffContainer.innerHTML = `<span style="color: var(--red)">Error loading diff: ${escapeHtml(e.message)}</span>`;
          }
        }
      }
    }
  } catch (e) {
    document.getElementById('prContent').innerHTML = `
      <div class="empty-state"><p>Failed to load PR details: ${escapeHtml(e.message)}</p></div>
    `;
  }
}

function buildRevisionTimeline(submissions, reviews, mergeEvents, mergeConflictEvents) {
  // Group by revision_number
  const revMap = new Map();

  for (const sub of submissions) {
    const revNum = sub.revision_number || 0;
    if (!revMap.has(revNum)) {
      revMap.set(revNum, { revisionNumber: revNum, submission: null, review: null, mergeEvents: [] });
    }
    revMap.get(revNum).submission = sub;
  }

  for (const rev of reviews) {
    const revNum = rev.revision_number || 0;
    if (!revMap.has(revNum)) {
      revMap.set(revNum, { revisionNumber: revNum, submission: null, review: null, mergeEvents: [] });
    }
    revMap.get(revNum).review = rev;
  }

  // Attach merge events to their revision
  for (const merge of mergeEvents) {
    const revNum = merge.revision_number || 0;
    if (!revMap.has(revNum)) {
      revMap.set(revNum, { revisionNumber: revNum, submission: null, review: null, mergeEvents: [] });
    }
    revMap.get(revNum).mergeEvents.push(merge);
  }

  // Attach pre-review merge conflict events to their revision
  for (const conflict of mergeConflictEvents) {
    const revNum = conflict.revision_number || 0;
    if (!revMap.has(revNum)) {
      revMap.set(revNum, { revisionNumber: revNum, submission: null, review: null, mergeEvents: [] });
    }
    // Mark as a pre-review merge conflict (distinct from merge_completed conflicts)
    revMap.get(revNum).mergeEvents.push({ ...conflict, isPreReviewConflict: true });
  }

  // Sort by revision number (oldest first for timeline)
  return Array.from(revMap.values()).sort((a, b) => a.revisionNumber - b.revisionNumber);
}

function renderPRContent(agent, revisions, mergeCompleted) {
  let html = '';

  // Overall status based on latest revision
  const latestRevision = revisions.length > 0 ? revisions[revisions.length - 1] : null;
  html += renderMergeStatus(agent, latestRevision?.review, mergeCompleted);

  // Revision timeline
  if (revisions.length > 0) {
    html += `
      <div class="pr-section">
        <div class="pr-section-header">Revision History (${revisions.length} ${revisions.length === 1 ? 'version' : 'versions'})</div>
        <div class="pr-section-body">
          <div class="revision-timeline">
            ${revisions.map((rev, idx) => renderRevisionEntry(rev, idx, revisions.length, mergeCompleted)).join('')}
          </div>
        </div>
      </div>
    `;
  }

  return html;
}

function renderPRContentWithTimeline(agent, revisions, mergeCompleted, chronoEvents) {
  let html = '';

  // Overall status based on latest revision
  const latestRevision = revisions.length > 0 ? revisions[revisions.length - 1] : null;
  html += renderMergeStatus(agent, latestRevision?.review, mergeCompleted);

  // Chronological Timeline section (NEW!)
  if (chronoEvents && chronoEvents.length > 0) {
    html += `
      <div class="pr-section">
        <div class="pr-section-header">Chronological Timeline (${chronoEvents.length} events)</div>
        <div class="pr-section-body">
          <div class="pr-chrono-timeline">
            ${renderChronoTimeline(chronoEvents)}
          </div>
        </div>
      </div>
    `;
  }

  // Revision timeline (existing, now secondary)
  if (revisions.length > 0) {
    html += `
      <div class="pr-section">
        <div class="pr-section-header">Revision Details (${revisions.length} ${revisions.length === 1 ? 'version' : 'versions'})</div>
        <div class="pr-section-body">
          <div class="revision-timeline">
            ${revisions.map((rev, idx) => renderRevisionEntry(rev, idx, revisions.length, mergeCompleted)).join('')}
          </div>
        </div>
      </div>
    `;
  }

  return html;
}

function renderChronoTimeline(events) {
  let html = '';
  let currentRevision = -1;

  for (const event of events) {
    const eventType = event.event;
    const ts = event.ts ? formatRelativeTime(event.ts) : '';
    const revNum = event.revision_number ?? 0;

    // Add revision marker when revision changes
    if (eventType === 'pr_submitted' || eventType === 'revision_started') {
      if (revNum !== currentRevision) {
        currentRevision = revNum;
        const revLabel = revNum > 0 ? `Revision ${revNum}` : 'Initial Submission';
        html += `<div class="pr-chrono-revision-marker">📌 ${revLabel}</div>`;
      }
    }

    // Determine event class (success/failure/pending/info)
    let eventClass = 'info';
    let details = '';

    switch (eventType) {
      case 'pr_submitted': {
        eventClass = 'info';
        const diffStats = event.diff_stats || {};
        const additions = diffStats['+'] || 0;
        const deletions = diffStats['-'] || 0;
        details = `PR submitted: <code>${escapeHtml(event.pr_id || '')}</code>`;
        if (additions || deletions) {
          details += ` (<span class="success">+${additions}</span> / <span class="failure">-${deletions}</span>)`;
        }
        break;
      }

      case 'review_launched':
        eventClass = 'pending';
        details = `Review started`;
        break;

      case 'pre_review_merge':
      case 'pre_review_rebase': {
        const success = event.success;
        eventClass = success ? 'success' : 'failure';
        if (success) {
          details = `<span class="success">✓ Merged</span> main into PR branch`;
          if (event.main_commit_hash) {
            details += ` (main: <code>${event.main_commit_hash.slice(0, 8)}</code>)`;
          }
        } else {
          details = `<span class="failure">✗ Merge with main failed</span>`;
          if (event.conflict_files && event.conflict_files.length > 0) {
            details += `<br>Conflicts: ${event.conflict_files.map(f => `<code>${escapeHtml(f)}</code>`).join(', ')}`;
          }
        }
        break;
      }

      case 'review_completed': {
        const verdict = event.combined_verdict;
        eventClass = verdict === 'approve' ? 'success' : 'failure';
        details = `Review: <span class="${eventClass}">${verdict}</span>`;

        // Add math/engineering verdict details
        const mathVerdict = event.math?.verdict || event.semantic?.verdict;
        const engVerdict = event.engineering?.verdict;
        const verdicts = [];
        if (mathVerdict) verdicts.push(`Math: ${mathVerdict}`);
        if (engVerdict) verdicts.push(`Eng: ${engVerdict}`);
        if (event.build_passed !== undefined) {
          verdicts.push(`Build: ${event.build_passed ? '✓' : '✗'}`);
        }
        if (verdicts.length > 0) {
          details += ` (${verdicts.join(', ')})`;
        }
        break;
      }

      case 'build_completed': {
        const passed = event.passed;
        eventClass = passed ? 'success' : 'failure';
        const duration = event.duration_s ? ` <span class="duration">(${event.duration_s.toFixed(1)}s)</span>` : '';
        const context = event.context ? `[${event.context}] ` : '';
        details = `${context}Build <span class="${eventClass}">${passed ? 'passed' : 'FAILED'}</span>${duration}`;
        if (!passed && event.error) {
          const truncatedError = event.error.length > 100 ? event.error.slice(0, 100) + '...' : event.error;
          details += `<br><code style="color: var(--red); font-size: 10px;">${escapeHtml(truncatedError)}</code>`;
        }
        break;
      }

      case 'merge_completed': {
        const success = event.success;
        eventClass = success ? 'success' : 'failure';
        if (success) {
          const commitHash = event.commit_hash ? event.commit_hash.slice(0, 8) : '';
          details = `<span class="success">✓ Merged</span>`;
          if (commitHash) details += ` → <code>${commitHash}</code>`;
          if (event.build_duration_s) {
            details += ` <span class="duration">(build: ${event.build_duration_s.toFixed(1)}s)</span>`;
          }
        } else {
          const reason = event.failure_reason || 'unknown';
          details = `<span class="failure">✗ Merge failed:</span> ${reason}`;
          if (event.conflict_files && event.conflict_files.length > 0) {
            details += `<br>Conflicts: ${event.conflict_files.map(f => `<code>${escapeHtml(f)}</code>`).join(', ')}`;
          }
          if (event.error && reason !== 'merge_conflict') {
            const truncatedError = event.error.length > 80 ? event.error.slice(0, 80) + '...' : event.error;
            details += `<br><code style="color: var(--red); font-size: 10px;">${escapeHtml(truncatedError)}</code>`;
          }
        }
        break;
      }

      case 'revision_started':
        eventClass = 'pending';
        details = `Started revision ${revNum} (addressing feedback)`;
        break;

      case 'pr_status_changed': {
        const newStatus = event.new_status;
        eventClass = newStatus === 'approved' || newStatus === 'merged' ? 'success' :
                     newStatus === 'needs_revision' || newStatus === 'failed' ? 'failure' : 'info';
        details = `Status → <span class="${eventClass}">${newStatus}</span>`;
        // Show failure reason if available
        if (newStatus === 'failed' && event.reason) {
          const reasonText = event.reason.replace(/_/g, ' ');
          details += `<br><span style="color: var(--text-dim); font-size: 11px;">Reason: ${escapeHtml(reasonText)}</span>`;
          if (event.error) {
            const errorPreview = event.error.split('\n')[0].slice(0, 100);
            details += `<br><span style="color: var(--text-dim); font-size: 11px;">${escapeHtml(errorPreview)}${event.error.length > 100 ? '...' : ''}</span>`;
          }
        }
        break;
      }

      case 'agent_dispatch_failed': {
        eventClass = 'failure';
        const reason = event.reason ? event.reason.replace(/_/g, ' ') : 'unknown';
        details = `Agent dispatch failed: ${escapeHtml(reason)}`;
        if (event.error) {
          const errorPreview = event.error.split('\n')[0].slice(0, 100);
          details += `<br><span style="color: var(--text-dim); font-size: 11px;">${escapeHtml(errorPreview)}${event.error.length > 100 ? '...' : ''}</span>`;
        }
        break;
      }

      case 'fix_request':
        eventClass = 'info';
        const theoremName = event.theorem_name ? `<code>${escapeHtml(event.theorem_name)}</code>` : '';
        details = `Fixed theorem ${theoremName}`;
        if (event.request) {
          // Show first line of request
          const firstLine = event.request.split('\n')[0].slice(0, 80);
          details += `<br><span style="color: var(--text-dim); font-size: 11px;">${escapeHtml(firstLine)}${event.request.length > 80 ? '...' : ''}</span>`;
        }
        break;

      default:
        details = eventType;
    }

    html += `
      <div class="pr-chrono-event ${eventClass}">
        <div class="pr-chrono-event-header">
          <span class="pr-chrono-event-type ${eventType}">${eventType.replace(/_/g, ' ')}</span>
          <span class="pr-chrono-event-time">${ts}</span>
        </div>
        <div class="pr-chrono-event-details">${details}</div>
      </div>
    `;
  }

  return html;
}

function renderRevisionEntry(rev, index, total, mergeCompleted) {
  const isLatest = index === total - 1;
  const revNum = rev.revisionNumber;
  const submission = rev.submission;
  const review = rev.review;
  const mergeEvents = rev.mergeEvents || [];

  // Determine entry state for styling
  let entryClass = '';
  if (isLatest && mergeCompleted?.success) {
    entryClass = 'approved';
  } else if (review?.combined_verdict === 'approve') {
    entryClass = 'approved';
  } else if (review?.combined_verdict === 'reject' || review?.combined_verdict === 'request_changes') {
    entryClass = 'rejected';
  } else if (isLatest) {
    entryClass = 'current';
  }

  // Revision label
  const revLabel = revNum > 0 ? `Rev ${revNum}` : 'Initial';

  // Diff stats
  const diffStats = submission?.diff_stats || {};
  const additions = diffStats['+'] || 0;
  const deletions = diffStats['-'] || 0;
  const statsHtml = `<span class="revision-stats"><span style="color: var(--green);">+${additions}</span> <span style="color: var(--red);">-${deletions}</span></span>`;

  // Verdict display
  let verdictHtml = '';
  if (review) {
    const verdict = review.combined_verdict;
    const verdictClass = verdict === 'approve' ? 'green' : verdict === 'reject' ? 'red' : 'yellow';
    verdictHtml = `<span class="revision-verdict" style="color: var(--${verdictClass});">${verdict}</span>`;
  }

  // Time display
  const submissionTime = submission?.ts ? formatRelativeTime(submission.ts) : '';
  const reviewTime = review?.ts ? formatRelativeTime(review.ts) : '';

  // Diff HTML
  let diffHtml = '';
  if (submission?.diff) {
    diffHtml = `<div class="revision-diff">${renderDiffContent(submission.diff)}</div>`;
  } else if (submission?.diff_file) {
    diffHtml = `<div class="revision-diff" id="diff-${revNum}"><em>Loading diff...</em></div>`;
  }

  // Full review details (shown after diff)
  const reviewDetailsHtml = review ? renderReviewDetails(review) : '';

  // Merge events attached to this revision
  const mergeEventsHtml = mergeEvents.length > 0 ? renderMergeEvents(mergeEvents) : '';

  return `
    <div class="revision-entry ${entryClass}">
      <div class="revision-content">
        <div class="revision-header">
          <span class="revision-label">${revLabel}</span>
          ${statsHtml}
          ${verdictHtml}
          <span class="revision-time">${submissionTime}${reviewTime ? ' → reviewed ' + reviewTime : ''}</span>
        </div>
        ${diffHtml}
        ${reviewDetailsHtml}
        ${mergeEventsHtml}
      </div>
    </div>
  `;
}

function toggleRevisionDiff(id) {
  const el = document.getElementById(id);
  if (el) {
    el.classList.toggle('expanded');
  }
}

function renderMergeStatus(agent, reviewCompleted, mergeCompleted) {
  let statusClass = 'waiting';
  let statusText = 'Pending Review';
  let statusIcon = '';
  let detailsHtml = '';

  if (mergeCompleted) {
    if (mergeCompleted.success) {
      statusClass = 'merged';
      statusText = `Merged (${mergeCompleted.commit_hash ? mergeCompleted.commit_hash.slice(0, 8) : 'success'})`;
      statusIcon = '✓';
    } else {
      statusClass = 'blocked';
      // Build a more informative failure message
      const failureReason = mergeCompleted.failure_reason;
      if (failureReason === 'merge_conflict') {
        statusText = 'Merge Conflict';
      } else if (failureReason === 'build_failed') {
        statusText = 'Build Failed After Merge';
      } else if (failureReason === 'build_timeout') {
        statusText = 'Build Timeout';
      } else {
        statusText = `Merge Failed: ${mergeCompleted.error || 'Unknown error'}`;
      }
      statusIcon = '✗';

      // Add details section for failures
      const details = [];
      if (mergeCompleted.conflict_files && mergeCompleted.conflict_files.length > 0) {
        details.push(`<div style="margin-top: 4px; font-size: 11px;"><strong>Conflicting files:</strong> ${mergeCompleted.conflict_files.map(f => `<code>${escapeHtml(f)}</code>`).join(', ')}</div>`);
      }
      if (mergeCompleted.main_commit_hash) {
        details.push(`<div style="font-size: 10px; color: var(--muted);">Against main: ${mergeCompleted.main_commit_hash}</div>`);
      }
      if (mergeCompleted.build_duration_s !== undefined && failureReason === 'build_failed') {
        details.push(`<div style="font-size: 10px; color: var(--muted);">Build duration: ${mergeCompleted.build_duration_s.toFixed(1)}s</div>`);
      }
      if (mergeCompleted.error && failureReason !== 'merge_conflict') {
        // Show truncated error for non-conflict failures
        const truncatedError = mergeCompleted.error.length > 200 ? mergeCompleted.error.slice(0, 200) + '...' : mergeCompleted.error;
        details.push(`<div style="margin-top: 4px; font-size: 11px; color: var(--red); white-space: pre-wrap; font-family: var(--font-mono);">${escapeHtml(truncatedError)}</div>`);
      }
      detailsHtml = details.join('');
    }
  } else if (reviewCompleted) {
    const verdict = reviewCompleted.combined_verdict;
    if (verdict === 'approve') {
      statusClass = 'ready';
      statusText = 'Ready to Merge';
      statusIcon = '✓';
    } else if (verdict === 'reject' || verdict === 'request_changes') {
      statusClass = 'blocked';
      statusText = 'Changes Requested';
      statusIcon = '✗';
    } else {
      statusClass = 'waiting';
      statusText = `Review: ${verdict}`;
      statusIcon = '';
    }
  } else if (agent && agent.status === 'error') {
    statusClass = 'blocked';
    statusText = 'Agent Error';
    statusIcon = '✗';
  }

  return `
    <div class="merge-status ${statusClass}">
      <span style="font-size: 14px;">${statusIcon}</span>
        <span style="font-weight: 600; font-size: 12px;">${statusText}</span>
      ${detailsHtml}
    </div>
  `;
}

function renderReviewDetails(review) {
  let content = '';

  // Derive reviewer agent IDs from pr_id (they follow the pattern math-{pr_id} and engineering-{pr_id})
  const prId = review.pr_id;
  const mathReviewerAgentId = prId ? `math-${prId}` : null;
  const engReviewerAgentId = prId ? `engineering-${prId}` : null;

  // Math review
  if (review.math) {
    const verdictClass = review.math.verdict === 'approve' ? 'verdict-approve' :
                          review.math.verdict === 'reject' ? 'verdict-reject' : 'verdict-changes';
    const dialogLink = mathReviewerAgentId ?
      `<a href="#" class="reviewer-dialog-link" onclick="navigateTo('dialog', '${escapeHtml(mathReviewerAgentId)}'); return false;" title="View full reviewer dialog">[dialog]</a>` : '';
    content += `
      <div class="review-item" style="margin-bottom: 10px;">
        <div class="review-item-header">
          <span class="review-item-type review-type-math">Math Review</span>
          <span class="review-item-verdict ${verdictClass}">${review.math.verdict}</span>
          ${dialogLink}
        </div>
        ${review.math.summary ? `<div class="review-item-summary">${renderMarkdown(review.math.summary)}</div>` : ''}
      </div>
    `;
  }

  // Engineering review
  if (review.engineering) {
    const verdictClass = review.engineering.verdict === 'approve' ? 'verdict-approve' :
                          review.engineering.verdict === 'reject' ? 'verdict-reject' : 'verdict-changes';
    const dialogLink = engReviewerAgentId ?
      `<a href="#" class="reviewer-dialog-link" onclick="navigateTo('dialog', '${escapeHtml(engReviewerAgentId)}'); return false;" title="View full reviewer dialog">[dialog]</a>` : '';
    content += `
      <div class="review-item" style="margin-bottom: 10px;">
        <div class="review-item-header">
          <span class="review-item-type review-type-eng">Engineering Review</span>
          <span class="review-item-verdict ${verdictClass}">${review.engineering.verdict}</span>
          ${dialogLink}
        </div>
        ${review.engineering.summary ? `<div class="review-item-summary">${renderMarkdown(review.engineering.summary)}</div>` : ''}
      </div>
    `;
  }

  // Build status
  if (review.build_passed !== undefined) {
    const passed = review.build_passed;
    content += `
      <div class="review-item">
        <div class="review-item-header">
          <span class="review-item-type review-type-build">Build</span>
          <span class="review-item-verdict ${passed ? 'verdict-approve' : 'verdict-reject'}">${passed ? 'Passed' : 'Failed'}</span>
        </div>
        ${review.build_output ? `<div class="review-item-summary" style="font-family: var(--font-mono); font-size: 12px; max-height: 200px; overflow: auto; white-space: pre-wrap;">${escapeHtml(review.build_output)}</div>` : ''}
      </div>
    `;
  }

  if (!content) {
    return '';
  }

  return `
    <div class="revision-review-details" style="margin-top: 12px; padding: 12px; background: var(--bg-secondary); border-radius: 6px; border-left: 3px solid var(--border);">
      <div style="font-weight: 600; margin-bottom: 8px; font-size: 13px; color: var(--text-secondary);">Review Comments</div>
      ${content}
    </div>
  `;
}

function renderMergeEvents(mergeEvents) {
  if (!mergeEvents || mergeEvents.length === 0) return '';

  const items = mergeEvents.map(event => {
    const ts = event.ts ? formatRelativeTime(event.ts) : '';

    // Pre-review merge conflict detection
    if (event.isPreReviewConflict || event.event === 'merge_conflict_detected') {
      const files = event.conflict_files?.join(', ') || 'unknown files';
      const mainHash = event.main_commit_hash ? ` (main: ${event.main_commit_hash})` : '';
      return `
        <div class="merge-event merge-event-conflict" style="display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px; background: rgba(248, 81, 73, 0.1); border-radius: 4px; border-left: 3px solid var(--red);">
          <span style="color: var(--red); font-size: 14px;">⚠</span>
          <div style="flex: 1;">
            <div style="font-weight: 500; color: var(--red);">Pre-review Merge Conflict</div>
            <div style="font-size: 12px; color: var(--text-secondary); margin-top: 2px;">
              Conflicting files: <code style="background: var(--bg-tertiary); padding: 1px 4px; border-radius: 3px;">${escapeHtml(files)}</code>${mainHash}
            </div>
            ${ts ? `<div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">${ts}</div>` : ''}
          </div>
        </div>
      `;
    }

    // Merge completed event
    if (event.success) {
      const commitHash = event.commit_hash?.slice(0, 8) || 'success';
      return `
        <div class="merge-event merge-event-success" style="display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px; background: rgba(63, 185, 80, 0.1); border-radius: 4px; border-left: 3px solid var(--green);">
          <span style="color: var(--green); font-size: 14px;">✓</span>
          <div style="flex: 1;">
            <div style="font-weight: 500; color: var(--green);">Merged Successfully</div>
            <div style="font-size: 12px; color: var(--text-secondary); margin-top: 2px;">
              Commit: <code style="background: var(--bg-tertiary); padding: 1px 4px; border-radius: 3px;">${escapeHtml(commitHash)}</code>
            </div>
            ${ts ? `<div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">${ts}</div>` : ''}
          </div>
        </div>
      `;
    }

    // Failed merge
    const failureReason = event.failure_reason;
    let title = 'Merge Failed';
    let details = [];

    if (failureReason === 'merge_conflict') {
      title = 'Merge Conflict';
      if (event.conflict_files?.length > 0) {
        details.push(`Conflicting files: <code style="background: var(--bg-tertiary); padding: 1px 4px; border-radius: 3px;">${escapeHtml(event.conflict_files.join(', '))}</code>`);
      }
    } else if (failureReason === 'build_failed') {
      title = 'Build Failed After Merge';
      if (event.build_duration_s !== undefined) {
        details.push(`Build duration: ${event.build_duration_s.toFixed(1)}s`);
      }
      if (event.error) {
        const truncated = event.error.length > 300 ? event.error.slice(0, 300) + '...' : event.error;
        details.push(`<pre style="font-size: 11px; margin: 4px 0 0 0; padding: 6px; background: var(--bg-tertiary); border-radius: 4px; overflow-x: auto; white-space: pre-wrap;">${escapeHtml(truncated)}</pre>`);
      }
    } else if (failureReason === 'build_timeout') {
      title = 'Build Timeout';
    } else if (event.error) {
      details.push(escapeHtml(event.error));
    }

    if (event.main_commit_hash) {
      details.push(`Against main: <code style="background: var(--bg-tertiary); padding: 1px 4px; border-radius: 3px;">${escapeHtml(event.main_commit_hash)}</code>`);
    }

    return `
      <div class="merge-event merge-event-failure" style="display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px; background: rgba(248, 81, 73, 0.1); border-radius: 4px; border-left: 3px solid var(--red);">
        <span style="color: var(--red); font-size: 14px;">✗</span>
        <div style="flex: 1;">
          <div style="font-weight: 500; color: var(--red);">${title}</div>
          ${details.length > 0 ? `<div style="font-size: 12px; color: var(--text-secondary); margin-top: 2px;">${details.join('<br>')}</div>` : ''}
          ${ts ? `<div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">${ts}</div>` : ''}
        </div>
      </div>
    `;
  });

  return `
    <div class="revision-merge-events" style="margin-top: 12px; display: flex; flex-direction: column; gap: 8px;">
      ${items.join('')}
    </div>
  `;
}

function renderDiffContent(content) {
  if (!content) return '<div class="empty-state"><p>No diff content</p></div>';

  const lines = content.split('\n');
  let lineNumOld = 0;
  let lineNumNew = 0;
  let inLeanFile = false;

  const renderedLines = lines.map(line => {
    let cls = 'line-ctx';
    let sign = ' ';

    // Check if we're entering a Lean file
    if (line.startsWith('diff --git') && (line.includes('.lean') || line.includes('.lake'))) {
      inLeanFile = true;
    } else if (line.startsWith('diff --git')) {
      inLeanFile = false;
    }

    if (line.startsWith('+++') || line.startsWith('---') || line.startsWith('diff --git') || line.startsWith('index ')) {
      cls = 'line-header';
      sign = '';
    } else if (line.startsWith('@@')) {
      cls = 'line-hunk';
      sign = '';
      // Parse hunk header for line numbers
      const match = line.match(/@@ -(\d+)/);
      if (match) lineNumOld = parseInt(match[1], 10) - 1;
      const matchNew = line.match(/@@ -\d+(?:,\d+)? \+(\d+)/);
      if (matchNew) lineNumNew = parseInt(matchNew[1], 10) - 1;
    } else if (line.startsWith('+')) {
      cls = 'line-add';
      sign = '+';
      lineNumNew++;
    } else if (line.startsWith('-')) {
      cls = 'line-del';
      sign = '-';
      lineNumOld++;
    } else {
      lineNumOld++;
      lineNumNew++;
    }

    // Get the code content (strip the leading +/- for syntax highlighting)
    let codeContent = line;
    if (cls === 'line-add' || cls === 'line-del') {
      codeContent = line.slice(1);
    }

    // Apply Lean syntax highlighting if in a Lean file
    let highlightedContent;
    if (inLeanFile && (cls === 'line-add' || cls === 'line-del' || cls === 'line-ctx')) {
      highlightedContent = hljs.highlight(codeContent, { language: 'lean', ignoreIllegals: true }).value;
    } else {
      highlightedContent = escapeHtml(codeContent);
    }

    // Build the line HTML
    const lineNumDisplay = cls === 'line-header' || cls === 'line-hunk' ? '' :
                           cls === 'line-add' ? lineNumNew :
                           cls === 'line-del' ? lineNumOld :
                           lineNumNew;

    return `<span class="diff-line ${cls}"><span class="diff-line-num">${lineNumDisplay}</span><span class="diff-line-sign">${sign}</span><code>${highlightedContent}</code></span>`;
  });

  return `<div class="diff-content">${renderedLines.join('')}</div>`;
}

// ─── Code Rendering ──────────────────────────────────────────────
function renderCodeBlock(code, lang = '') {
  const langClass = lang ? `language-${lang}` : '';
  return `
    <div style="position: relative;">
      <pre><code class="${langClass}">${escapeHtml(code)}</code></pre>
      <button class="copy-btn" onclick="copyCode(this)">Copy</button>
    </div>
  `;
}

function copyCode(btn) {
  const code = btn.previousElementSibling.textContent;
  navigator.clipboard.writeText(code);
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy', 1500);
}

// ─── Utilities ───────────────────────────────────────────────────
function parseDiffStats(diff) {
  // Parse diff content to compute additions and deletions
  // Matches Python's parse_diff_stats in lean_utils.py
  if (typeof diff !== 'string') return { '+': 0, '-': 0 };
  const lines = diff.split('\n');
  let additions = 0;
  let deletions = 0;
  for (const line of lines) {
    if (line.startsWith('+') && !line.startsWith('+++')) {
      additions++;
    } else if (line.startsWith('-') && !line.startsWith('---')) {
      deletions++;
    }
  }
  return { '+': additions, '-': deletions };
}

function escapeHtml(str) {
  if (typeof str !== 'string') return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderMarkdown(str) {
  if (typeof str !== 'string' || !str.trim()) return '';
  try {
    // Configure marked with safe options
    marked.setOptions({
      breaks: true,
      gfm: true,
      headerIds: false,
      mangle: false
    });
    return marked.parse(str);
  } catch (e) {
    // Fallback to escaped text if markdown parsing fails
    console.warn('Markdown parsing failed:', e);
    return escapeHtml(str);
  }
}

function formatTime(ts) {
  if (!ts) return '—';
  try {
    const d = new Date(ts);
    return d.toLocaleTimeString();
  } catch {
    return ts;
  }
}

function formatDuration(seconds) {
  if (!seconds) return '—';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);

  if (h > 0) return `${h}h ${m}m ${s}s`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

function formatAgentRuntime(agent) {
  if (!agent.start_ts) return '—';
  const start = new Date(agent.start_ts);
  const end = agent.done_ts ? new Date(agent.done_ts) : new Date();
  const seconds = (end - start) / 1000;
  const suffix = agent.done_ts ? '' : '+';
  return formatDuration(seconds) + suffix;
}

function formatDiffStats(agent) {
  const diffStats = agent.diff_stats || {};
  const additions = diffStats['+'];
  const deletions = diffStats['-'];
  if (additions === undefined && deletions === undefined) return '—';
  const addStr = additions ? `<span style="color: var(--green);">+${additions}</span>` : '';
  const delStr = deletions ? `<span style="color: var(--red);">-${deletions}</span>` : '';
  if (!addStr && !delStr) return '—';
  return `<span style="white-space: nowrap;">${[addStr, delStr].filter(Boolean).join(' ')}</span>`;
}

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

(async function() {
  await loadRunList();
  const params = new URLSearchParams(window.location.search);
  const path = params.get('path') || params.get('run');
  const page = params.get('page');
  const agentId = params.get('agent');

  if (path) {
    document.getElementById('runSelector').value = path;
    currentRun = path;

    // Set initial page state from URL
    if (page === 'dialog' && agentId) {
      currentPage = 'dialog';
      currentAgentId = agentId;
    } else if (page === 'pr' && agentId) {
      currentPage = 'pr';
      currentAgentId = agentId;
    } else if (page === 'logs') {
      currentPage = 'logs';
      currentAgentId = null;
    }

    loadSession(path);
    connectWebSocket(path);
  } else {
    // Auto-select the most recent run (first option after the placeholder)
    const selector = document.getElementById('runSelector');
    if (selector.options.length > 1) {
      const mostRecent = selector.options[1].value;
      selector.value = mostRecent;
      selectRun(mostRecent);
    }
  }

  // Handle browser back/forward
  window.addEventListener('popstate', () => {
    const params = new URLSearchParams(window.location.search);
    const path = params.get('path');
    const page = params.get('page');
    const agentId = params.get('agent');

    if (path && path !== currentRun) {
      selectRun(path);
    } else if (path) {
      if (page === 'dialog' && agentId) {
        currentPage = 'dialog';
        currentAgentId = agentId;
      } else if (page === 'pr' && agentId) {
        currentPage = 'pr';
        currentAgentId = agentId;
      } else if (page === 'logs') {
        currentPage = 'logs';
        currentAgentId = null;
      } else {
        currentPage = 'main';
        currentAgentId = null;
      }
      renderCurrentPage();
    }
  });
})();
</script>
</body>
</html>
